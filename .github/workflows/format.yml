name: Format the Readme file.

# Run formatter on every pull request
on:
  pull_request:
  push:

permissions:
  contents: read
  pages: write   

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prettify code
        uses: creyD/prettier_action@v4.3
        with:
          # This part is also where you can pass other options, for example:
          prettier_options: -c ./README.md 